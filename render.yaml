services:
  - type: web
    name: vineetra-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false   # Set this manually in Render dashboard
    healthCheckPath: /health
    autoDeploy: true
